<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HABITS">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="https://img.icons8.com/ios/512/signing-a-document.png">
<title>ARNAUD | HABITS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --amber: #FFB800;
  --amber-dim: rgba(255,184,0,0.10);
  --amber-border: rgba(255,184,0,0.28);
  --bg: #000;
  --bg2: #080808;
  --border: #1a1a1a;
  --white: #fff;
  --green: #00CC55;
  --red: #FF3333;
  --gray: #444;
  --font: 'IBM Plex Mono', monospace;
}

body { background:var(--bg); color:var(--white); font-family:var(--font); min-height:100dvh; display:flex; flex-direction:column; }

header { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; border-bottom:1px solid var(--amber); flex-shrink:0; position:sticky; top:0; background:var(--bg); z-index:10; }
.h-name { font-size:10px; font-weight:700; color:var(--amber); letter-spacing:0.15em; }
.h-right { font-size:10px; color:#555; display:flex; align-items:center; gap:8px; }
.dot { width:5px; height:5px; border-radius:50%; background:var(--green); animation:p 2s infinite; }
@keyframes p { 0%,100%{opacity:1}50%{opacity:.3} }
#clock { color:var(--amber); }

.main { flex:1; padding:16px; max-width:480px; margin:0 auto; width:100%; }

/* TOP BAR */
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid var(--border); }
.date-block .date-big { font-size:20px; font-weight:700; color:var(--white); }
.date-block .date-sub { font-size:10px; color:var(--amber); letter-spacing:0.1em; margin-top:2px; }
.score-block { text-align:right; }
.score-num { font-size:36px; font-weight:700; line-height:1; transition:color 0.3s; }
.score-label { font-size:9px; color:#555; letter-spacing:0.1em; margin-top:2px; }

/* BARS */
.progress-bar { height:2px; background:var(--border); margin-bottom:6px; }
.progress-fill { height:100%; background:var(--amber); transition:width 0.4s ease; }
.xp-block { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.xp-label { font-size:9px; color:#555; letter-spacing:0.1em; }
.xp-num { font-size:13px; font-weight:700; color:var(--amber); }
.progress-bar-xp { height:2px; background:var(--border); margin-bottom:20px; }
.progress-fill-xp { height:100%; background:var(--amber); opacity:0.55; transition:width 0.4s ease; }

/* SECTION LABEL */
.section-label { font-size:9px; color:var(--amber); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* HABIT ROW */
.habits-list { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
.habit-row { display:flex; align-items:center; gap:12px; padding:14px; border:1px solid var(--border); background:var(--bg2); cursor:pointer; transition:all 0.15s; }
.habit-row:active { opacity:0.7; }
.habit-row.checked { border-color:var(--amber); background:#0a0800; }
.habit-check { width:22px; height:22px; border:1px solid var(--gray); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; font-size:13px; }
.habit-row.checked .habit-check { border-color:var(--amber); background:var(--amber); color:#000; }
.habit-info { flex:1; }
.habit-name { font-size:12px; font-weight:600; color:var(--white); letter-spacing:0.06em; }
.habit-desc { font-size:9px; color:#555; margin-top:2px; letter-spacing:0.05em; }
.habit-row.checked .habit-name { color:var(--amber); }

/* COMMENTAIRE DU JOUR */
.comment-wrap { margin-bottom:24px; }
.day-comment {
  width:100%;
  background:var(--bg2);
  border:1px solid var(--border);
  color:var(--white);
  font-family:var(--font);
  font-size:11px;
  padding:12px 14px;
  resize:none;
  min-height:70px;
  outline:none;
  letter-spacing:0.04em;
  line-height:1.7;
  transition:border-color 0.2s;
}
.day-comment:focus { border-color:var(--amber-border); }
.day-comment::placeholder { color:#2a2a2a; font-style:italic; }

/* DEEN HEADER */
.deen-header-block { background:var(--amber-dim); border:1px solid var(--amber-border); border-left:2px solid var(--amber); padding:10px 14px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
.deen-header-title { font-size:9px; font-weight:700; letter-spacing:0.15em; color:var(--amber); }
.deen-xp-display { font-size:13px; font-weight:700; color:var(--amber); }

/* DEEN ROW */
.deen-list { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
.deen-row { display:flex; align-items:center; gap:12px; padding:12px 14px; border:1px solid var(--border); background:var(--bg2); cursor:pointer; transition:all 0.15s; position:relative; overflow:hidden; }
.deen-row::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--amber); opacity:0.25; transition:opacity 0.15s; }
.deen-row:hover::before { opacity:0.8; }
.deen-row:active { opacity:0.7; }
.deen-row.done-partial { border-color:rgba(255,184,0,0.35); background:#0a0800; }
.deen-row.done-partial .deen-row-name { color:var(--amber); }
.deen-row.done-full { border-color:rgba(255,184,0,0.6); background:#0d0a00; }
.deen-row.done-full .deen-row-name { color:var(--amber); opacity:0.55; text-decoration:line-through; }
.deen-row-check { width:22px; height:22px; border:1px solid var(--gray); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:12px; font-weight:700; transition:all 0.15s; }
.deen-row.done-partial .deen-row-check { border-color:var(--amber); background:var(--amber); color:#000; }
.deen-row.done-full .deen-row-check { border-color:var(--amber); background:transparent; color:var(--amber); font-size:9px; }
.deen-row-info { flex:1; min-width:0; }
.deen-row-name { font-size:12px; font-weight:600; color:var(--white); letter-spacing:0.06em; }
.deen-row-desc { font-size:9px; color:#555; margin-top:2px; letter-spacing:0.05em; }
.deen-row-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.deen-xp-badge { font-size:10px; font-weight:700; color:var(--amber); opacity:0.65; white-space:nowrap; }
.session-dots { display:flex; gap:3px; }
.session-dot { width:5px; height:5px; border:1px solid #333; transition:all 0.2s; }
.session-dot.filled { background:var(--amber); border-color:var(--amber); }

/* ═══════════════════════════════════════
   RAWATIB — MENU DÉROULANT
═══════════════════════════════════════ */
.rawatib-section { margin-bottom:16px; }

.rawatib-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:11px 14px;
  border:1px solid var(--amber-border);
  background:var(--amber-dim);
  border-left:2px solid var(--amber);
  cursor:pointer;
  transition:all 0.15s;
  user-select:none;
}
.rawatib-header:active { opacity:0.75; }
.rawatib-header-left { display:flex; align-items:center; gap:8px; }
.rawatib-chevron { font-size:8px; color:var(--amber); transition:transform 0.2s; display:inline-block; }
.rawatib-chevron.open { transform:rotate(90deg); }
.rawatib-title { font-size:9px; font-weight:700; letter-spacing:0.15em; color:var(--amber); }
.rawatib-xp-total { font-size:11px; font-weight:700; color:var(--amber); }

.rawatib-body {
  display:none;
  flex-direction:column;
  gap:4px;
  margin-top:4px;
}
.rawatib-body.open { display:flex; }

.rawatib-row {
  display:flex;
  align-items:center;
  gap:12px;
  padding:11px 14px;
  border:1px solid var(--border);
  background:var(--bg2);
  cursor:pointer;
  transition:all 0.15s;
  border-left:2px solid transparent;
}
.rawatib-row:active { opacity:0.7; }
.rawatib-row.done { border-color:rgba(255,184,0,0.4); border-left-color:var(--amber); background:#0a0800; }
.rawatib-check {
  width:20px; height:20px;
  border:1px solid var(--gray);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-size:11px; font-weight:700;
  transition:all 0.15s;
}
.rawatib-row.done .rawatib-check { border-color:var(--amber); background:var(--amber); color:#000; }
.rawatib-info { flex:1; min-width:0; }
.rawatib-name { font-size:11px; font-weight:600; color:var(--white); letter-spacing:0.06em; }
.rawatib-row.done .rawatib-name { color:var(--amber); }
.rawatib-desc { font-size:9px; color:#555; margin-top:2px; letter-spacing:0.04em; }
.rawatib-xp-badge { font-size:10px; font-weight:700; color:var(--amber); opacity:0.65; flex-shrink:0; white-space:nowrap; }

/* DEEN TOTAL */
.deen-total-row { display:flex; justify-content:space-between; align-items:center; padding:8px 14px; border:1px solid var(--amber-border); background:var(--amber-dim); margin-bottom:24px; }
.deen-total-label { font-size:9px; color:#888; letter-spacing:0.1em; }
.deen-total-val { font-size:13px; font-weight:700; color:var(--amber); }

/* SUBMIT */
.submit-wrap { padding-bottom:32px; }
.submit-btn { width:100%; height:48px; border:1px solid var(--amber); background:transparent; color:var(--amber); font-family:var(--font); font-size:12px; font-weight:700; letter-spacing:0.15em; cursor:pointer; transition:all 0.15s; }
.submit-btn:active { background:var(--amber); color:#000; }
.submit-btn.saved { opacity:0.5; }

/* TOAST */
.toast { position:fixed; bottom:16px; left:50%; transform:translateX(-50%) translateY(60px); background:#0a0800; border:1px solid var(--amber); padding:10px 20px; font-size:10px; color:var(--amber); letter-spacing:0.05em; z-index:999; transition:transform 0.3s; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* MUSLIM DAY */
.muslim-day-row { display:flex; align-items:center; gap:12px; padding:16px 14px; border:1px solid var(--border); background:var(--bg2); margin-bottom:16px; transition:all 0.4s; }
.muslim-day-row.unlocked { border-color:var(--amber); background:#0a0800; box-shadow:0 0 0 1px rgba(255,184,0,0.15); }
.muslim-day-check { width:22px; height:22px; border:1px solid var(--gray); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:13px; font-weight:700; transition:all 0.3s; color:transparent; }
.muslim-day-row.unlocked .muslim-day-check { border-color:var(--amber); background:var(--amber); color:#000; }
.muslim-day-info { flex:1; }
.muslim-day-name { font-size:12px; font-weight:700; color:#444; letter-spacing:0.1em; transition:color 0.3s; }
.muslim-day-row.unlocked .muslim-day-name { color:var(--amber); }
.muslim-day-desc { font-size:9px; color:#333; margin-top:2px; letter-spacing:0.05em; transition:color 0.3s; }
.muslim-day-row.unlocked .muslim-day-desc { color:#888; }
.muslim-day-xp { font-size:16px; font-weight:700; color:#333; transition:all 0.3s; letter-spacing:0.05em; }
.muslim-day-row.unlocked .muslim-day-xp { color:var(--amber); }

/* ═══════════════════════════════════════
   OVERLAY CAROUSEL
═══════════════════════════════════════ */
.deen-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.97); z-index:1000; flex-direction:column; align-items:center; justify-content:center; padding:16px; }
.deen-overlay.open { display:flex; }
.deen-modal { width:100%; max-width:480px; background:var(--bg); border:1px solid var(--amber-border); border-top:2px solid var(--amber); display:flex; flex-direction:column; max-height:90vh; }
.modal-hdr { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.modal-title { font-size:10px; font-weight:700; letter-spacing:0.15em; color:var(--amber); }
.modal-meta { display:flex; gap:10px; align-items:center; }
.modal-counter { font-size:9px; color:#555; letter-spacing:0.1em; }
.modal-close { background:none; border:1px solid #333; color:#555; font-family:var(--font); font-size:12px; cursor:pointer; padding:2px 8px; transition:all 0.15s; }
.modal-close:hover { border-color:var(--amber); color:var(--amber); }
.session-bar { display:flex; gap:6px; align-items:center; padding:7px 16px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
.session-bar-label { font-size:8px; color:#555; letter-spacing:0.1em; margin-right:2px; }
.session-pip { width:7px; height:7px; border:1px solid #333; transition:all 0.15s; }
.session-pip.done { background:var(--amber); border-color:var(--amber); }
.session-name { font-size:8px; letter-spacing:0.08em; margin-right:6px; }
.modal-body { flex:1; overflow-y:auto; padding:20px 16px 16px; display:flex; flex-direction:column; gap:16px; }
.arabic-text { font-size:clamp(22px,6vw,38px); text-align:center; line-height:2; color:var(--white); direction:rtl; unicode-bidi:embed; padding:8px 0; border-bottom:1px solid var(--border); }
.phonetic-text { font-size:11px; color:#777; text-align:center; font-style:italic; line-height:1.8; }
.traduction-text { font-size:11px; color:#666; text-align:center; line-height:1.8; border-top:1px solid var(--border); padding-top:12px; }
.traduction-text strong { color:#999; }
.contexte-block { background:var(--amber-dim); border:1px solid var(--amber-border); border-left:2px solid var(--amber); padding:10px 14px; }
.contexte-label { font-size:8px; font-weight:700; letter-spacing:0.2em; color:var(--amber); margin-bottom:6px; text-transform:uppercase; }
.contexte-text { font-size:10px; color:#777; line-height:1.7; }
.contexte-text em { color:var(--amber); font-style:normal; }
.modal-ftr { border-top:1px solid var(--border); padding:12px 16px; display:flex; justify-content:space-between; align-items:center; gap:8px; flex-shrink:0; }
.nav-btn { background:none; border:1px solid #333; color:#555; font-family:var(--font); font-size:10px; font-weight:700; letter-spacing:0.1em; padding:8px 14px; cursor:pointer; transition:all 0.15s; }
.nav-btn:hover:not(:disabled) { border-color:var(--amber); color:var(--amber); }
.nav-btn:disabled { opacity:0.2; cursor:not-allowed; }
.dot-track { display:flex; gap:5px; align-items:center; }
.dot-pip { width:5px; height:5px; border:1px solid #333; transition:all 0.2s; }
.dot-pip.active { background:var(--amber); border-color:var(--amber); }
.validate-btn { display:none; background:var(--amber); color:#000; border:none; font-family:var(--font); font-size:9px; font-weight:700; letter-spacing:0.15em; padding:10px 16px; cursor:pointer; text-transform:uppercase; transition:opacity 0.15s; }
.validate-btn:active { opacity:0.8; }
.validate-btn.visible { display:block; }
.validate-btn.maxed { background:#222; color:#555; cursor:default; }
</style>
</head>
<body>

<header>
  <div class="h-name">HABITS · DEEN</div>
  <div class="h-right"><span class="dot"></span><span id="clock">--:--</span></div>
</header>

<div class="main">

  <div class="top-bar">
    <div class="date-block">
      <div class="date-big" id="dateDisplay">--</div>
      <div class="date-sub" id="dayDisplay">--</div>
    </div>
    <div class="score-block">
      <div class="score-num" id="scoreNum" style="color:#555">0%</div>
      <div class="score-label">SCORE JOUR</div>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

    <span class="xp-label">DEEN XP</span>
    <span class="xp-num" id="xpDisplay">0 / 500</span>

  <!-- COMMENTAIRE DU JOUR -->
  <div class="comment-wrap">
    <div class="section-label">NOTE DU JOUR</div>

      class="day-comment"
      id="dayComment"
      placeholder="Aujourd'hui c'est l'Aïd…"
      oninput="saveComment()"
    ></textarea>
  </div>

  <div class="deen-header-block">
    <span class="deen-header-title">&#9670; DEEN MODULE &mdash; IB&#256;D&#256;T</span>
    <span class="deen-xp-display" id="deenXpHeader">0 XP</span>
  </div>

  <div class="section-label">INVOCATIONS &amp; LECTURE</div>
  <div class="deen-list" id="deenList1"></div>

  <div class="section-label">ACTES &amp; AUM&#212;NE</div>

  <!-- RAWATIB — MENU DÉROULANT -->

      <div class="rawatib-header-left">

  <div class="deen-total-row">
    <span class="deen-total-label">TOTAL DEEN XP &mdash; SESSION</span>
    <span class="deen-total-val" id="deenTotalVal">0 / 500 XP</span>
  </div>

  <!-- MUSLIM DAY -->
  <div class="muslim-day-row" id="muslimDayRow">
    <div class="muslim-day-check" id="muslimDayCheck"></div>
    <div class="muslim-day-info">
      <div class="muslim-day-name" id="muslimDayName">MUSLIM DAY</div>
      <div class="muslim-day-desc" id="muslimDayDesc">Atteins 500 XP pour déverrouiller</div>
    </div>
    <div class="muslim-day-xp" id="muslimDayXp">0 XP</div>
  </div>

  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" onclick="saveHabits()">SAUVEGARDER DANS OBSIDIAN</button>
  </div>
</div>

<!-- OVERLAY -->
<div class="deen-overlay" id="deenOverlay">
  <div class="deen-modal">
    <div class="modal-hdr">
      <span class="modal-title" id="modalTitle">—</span>
      <div class="modal-meta">
        <span class="modal-counter" id="modalCounter">1/1</span>
        <button class="modal-close" onclick="closeOverlay()">&#10005;</button>
      </div>
    </div>
    <div class="session-bar" id="sessionBar"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-ftr">
      <button class="nav-btn" id="btnPrev" onclick="prevCard()" disabled>&#9664; PR&#201;C.</button>
      <div class="dot-track" id="dotTrack"></div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="validate-btn" id="btnValidate" onclick="validateAct()">&#10003; VALIDER</button>
        <button class="nav-btn" id="btnNext" onclick="nextCard()">SUIV. &#9654;</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://blue-band-f7d7workout-obsidian.arnaudbuch400.workers.dev/';

/* ─── HABITS CLASSIQUES ─── */
const HABITS = [
  { id: 'pray_on_time',        name: "PRIÈRE À L'HEURE",    desc: '5 prières dans les temps' },
  { id: 'quran_15min',         name: 'CORAN 15 MIN',         desc: 'Lecture ou écoute quotidienne' },
  { id: 'steps_12000',         name: '12 000 PAS',           desc: 'Objectif marche quotidien' },
  { id: 'calories_tracking',   name: 'CALORIES TRACKÉES',    desc: 'Nutrition enregistrée' },
  { id: 'protein_150',         name: 'PROTÉINES 150G+',      desc: 'Objectif protéines atteint' },

  { id: 'family_contact',      name: 'CONTACT FAMILLE',      desc: 'Appel ou message famille' },
  { id: 'supplements',         name: 'SUPPLÉMENTS',          desc: 'Prise quotidienne' },
  { id: 'soul_check',          name: 'SOUL CHECK',           desc: 'Introspection du jour' },
  { id: 'cou_scapula',         name: 'COU + SCAPULA',        desc: 'Exercices cou et scapula 15min' },
  { id: 'magnesium_glycinate', name: 'MAGNÉSIUM GLYCINATE',  desc: 'Prise avant sommeil' },
];

/* ─── DEEN ITEMS ─── */
const DEEN = [
  { id:'adhkars',        name:'ADHKĀRS MATIN & SOIR',    desc:'Sayyid al-Istighfār · Protection · 4 invocations', max:2, labels:['MATIN','SOIR'],                                    xp:120, group:1, key:'adhkars' },
  { id:'ayat_kursi',     name:'ĀYAT AL-KURSĪ',           desc:'Verset du Trône — matin et soir',                  max:2, labels:['MATIN','SOIR'],                                    xp:50,  group:1, key:'ayat' },

        ar: 'أَسْتَغْفِرُ اللَّهَ الْعَظِيمَ\nالَّذِي لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ\nوَأَتُوبُ إِلَيْهِ',
        ph: 'Astaghfiru Llāha l-ʿAẓīma lladhī lā ilāha illā Huwa l-Ḥayyu l-Qayyūmu wa atūbu ilayh.',
        tr: 'Je demande pardon à Allah l\'Immense, en dehors duquel il n\'y a pas de divinité, le Vivant, Celui qui subsiste par Lui-même, et je me repens vers Lui.',
        ctx: 'Le Prophète ﷺ faisait istighfār plus de 70 fois par jour — al-Bukhārī (n°6307). <em>"Heureux celui qui trouve dans sa feuille de comptes beaucoup de demandes de pardon."</em> — Ibn Mājah. La Tawbah efface les péchés comme si on n\'en avait jamais commis.',
      },
    ]
  },
};

/* ─── STATE ─── */
let habitsState  = {};
let deenState    = {}; // { id: nbSessions }
let rawatibState = {}; // { id: boolean }
let dayComment   = '';

function getDate() { return new Date().toISOString().split('T')[0]; }

function load() {
  const raw = localStorage.getItem('habits_' + getDate());
  if (raw) {
    try {
      const s      = JSON.parse(raw);
      habitsState  = s.habits   || {};
      deenState    = s.deen     || {};
      rawatibState = s.rawatib  || {};
      dayComment   = s.comment  || '';
    } catch(e) {}
  }
}

function persist() {
  localStorage.setItem('habits_' + getDate(), JSON.stringify({
    habits:  habitsState,
    deen:    deenState,
    rawatib: rawatibState,
    comment: dayComment,
  }));
}

/* ─── HABITS ─── */
function toggleHabit(id) {
  habitsState[id] = !habitsState[id];
  persist();
  renderHabits();
  updateScore();
}

function renderHabits() {
  document.getElementById('habitsList').innerHTML = HABITS.map(h => `
    <div class="habit-row ${habitsState[h.id] ? 'checked' : ''}" onclick="toggleHabit('${h.id}')">
      <div class="habit-check">${habitsState[h.id] ? '✓' : ''}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-desc">${h.desc}</div>
      </div>
    </div>`).join('');
}

function updateScore() {
  const done  = HABITS.filter(h => habitsState[h.id]).length;
  const score = Math.round(done / HABITS.length * 100);
  const el    = document.getElementById('scoreNum');
  el.textContent = score + '%';
  el.style.color = score >= 80 ? 'var(--amber)' : score >= 50 ? 'var(--amber)' : 'var(--red)';
  document.getElementById('progressFill').style.width = score + '%';
}

/* ─── COMMENTAIRE ─── */
function saveComment() {
  dayComment = document.getElementById('dayComment').value;
  persist();
}

/* ─── DEEN ─── */
function deenXpTotal() {
  const fromDeen    = DEEN.reduce((s, item) => s + (deenState[item.id] || 0) * item.xp, 0);
  const fromRawatib = RAWATIB.reduce((s, r) => s + (rawatibState[r.id] ? r.xp : 0), 0);
  return fromDeen + fromRawatib;
}

function renderDeen() {
  document.getElementById('deenList1').innerHTML = '';
  document.getElementById('deenList2').innerHTML = '';

  DEEN.forEach(item => {
    const sessions = deenState[item.id] || 0;
    const full     = sessions >= item.max;
    const partial  = sessions > 0 && !full;

    let stateClass = full ? 'done-full' : partial ? 'done-partial' : '';
    let checkTxt   = full ? (item.max > 1 ? '✓✓' : '✓') : partial ? '✓' : '';

    let dotsHtml = '';
    if (item.max > 1) {
      dotsHtml = '<div class="session-dots">' +
        Array.from({length: item.max}, (_, i) =>
          `<div class="session-dot ${i < sessions ? 'filled' : ''}"></div>`
        ).join('') + '</div>';
    }

    const xpLabel = item.max > 1 ? `+${item.xp} XP ×${item.max}` : `+${item.xp} XP`;

    const html = `
      <div class="deen-row ${stateClass}" onclick="deenClick('${item.id}')">
        <div class="deen-row-check">${checkTxt}</div>
        <div class="deen-row-info">
          <div class="deen-row-name">${item.name}</div>
          <div class="deen-row-desc">${item.desc}</div>
        </div>
        <div class="deen-row-right">
          <div class="deen-xp-badge">${xpLabel}</div>
          ${dotsHtml}
        </div>
      </div>`;

    document.getElementById(item.group === 1 ? 'deenList1' : 'deenList2')
      .insertAdjacentHTML('beforeend', html);
  });

  const xp = deenXpTotal();
  document.getElementById('deenXpHeader').textContent = xp + ' XP';
  document.getElementById('deenTotalVal').textContent = xp + ' / 500 XP';
  document.getElementById('xpDisplay').textContent    = xp + ' / 500';
  document.getElementById('xpFill').style.width       = Math.min(xp / 5, 100) + '%';
  updateMuslimDay(xp);
}

/* ─── RAWATIB ─── */
let rawatibOpen = false;

function toggleRawatibSection() {
  rawatibOpen = !rawatibOpen;
  document.getElementById('rawatibBody').classList.toggle('open', rawatibOpen);
  document.getElementById('rawatibChevron').classList.toggle('open', rawatibOpen);
}

function toggleRawatib(id) {
  rawatibState[id] = !rawatibState[id];
  persist();
  renderRawatib();
  // Mettre à jour les totaux XP
  const xp = deenXpTotal();
  document.getElementById('deenXpHeader').textContent = xp + ' XP';
  document.getElementById('deenTotalVal').textContent = xp + ' / 500 XP';
  document.getElementById('xpDisplay').textContent    = xp + ' / 500';
  document.getElementById('xpFill').style.width       = Math.min(xp / 5, 100) + '%';
  updateMuslimDay(xp);
  showToast((rawatibState[id] ? '✓ ' : '○ ') + RAWATIB.find(r => r.id === id).name);
}

function renderRawatib() {
  const body  = document.getElementById('rawatibBody');
  const total = RAWATIB.reduce((s, r) => s + (rawatibState[r.id] ? r.xp : 0), 0);

  body.innerHTML = RAWATIB.map(r => `
    <div class="rawatib-row ${rawatibState[r.id] ? 'done' : ''}" onclick="toggleRawatib('${r.id}')">
      <div class="rawatib-check">${rawatibState[r.id] ? '✓' : ''}</div>
      <div class="rawatib-info">
        <div class="rawatib-name">${r.name}</div>
        <div class="rawatib-desc">${r.desc}</div>
      </div>
      <div class="rawatib-xp-badge">+${r.xp} XP</div>
    </div>`).join('');

  document.getElementById('rawatibXpBadge').textContent = total > 0 ? '+' + total + ' XP' : '0 XP';
}

/* ─── MUSLIM DAY ─── */
function updateMuslimDay(xp) {
  const row      = document.getElementById('muslimDayRow');
  const check    = document.getElementById('muslimDayCheck');
  const desc     = document.getElementById('muslimDayDesc');
  const xpEl     = document.getElementById('muslimDayXp');
  const unlocked = xp >= 500;
  row.classList.toggle('unlocked', unlocked);
  check.textContent = unlocked ? '✓' : '';
  desc.textContent  = unlocked
    ? 'Objectif atteint \u2014 ' + xp + ' XP DEEN'
    : 'Atteins 500 XP pour d\u00e9verrouiller \u2014 ' + xp + ' / 500';
  xpEl.textContent  = xp + ' XP';
}

/* ─── DEEN CLICK ─── */
function deenClick(id) {
  const item     = DEEN.find(i => i.id === id);
  const sessions = deenState[id] || 0;
  if (sessions >= item.max) return;

  if (item.key && CARDS[item.key]) {
    openOverlay(id);
  } else {
    deenState[id] = sessions + 1;
    persist();
    renderDeen();
    showToast('✓ ' + item.name + ' — ' + (item.labels[sessions] || 'FAIT') + ' (+' + item.xp + ' XP)');
  }
}

/* ─── CAROUSEL ─── */
let activeId = null;
let cardIdx  = 0;

function openOverlay(id) {
  activeId = id;
  cardIdx  = 0;
  renderModal();
  document.getElementById('deenOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOverlay() {
  document.getElementById('deenOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderModal() {
  const item     = DEEN.find(i => i.id === activeId);
  const data     = CARDS[item.key];
  const cards    = data.cards;
  const card     = cards[cardIdx];
  const sessions = deenState[activeId] || 0;
  const isLast   = cardIdx === cards.length - 1;
  const maxed    = sessions >= item.max;

  document.getElementById('modalTitle').textContent   = data.label;
  document.getElementById('modalCounter').textContent = 'CARTE ' + (cardIdx + 1) + '/' + cards.length;

  // Session bar
  let sb = '<span class="session-bar-label">SESSIONS</span>';
  for (let i = 0; i < item.max; i++) {
    sb += `<div class="session-pip ${i < sessions ? 'done' : ''}"></div>`;
    sb += `<span class="session-name" style="color:${i < sessions ? 'var(--amber)' : '#444'}">${item.labels[i] || (i+1)}</span>`;
  }
  document.getElementById('sessionBar').innerHTML = sb;

  // Dots
  const dt = document.getElementById('dotTrack');
  dt.innerHTML = '';
  cards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot-pip' + (i === cardIdx ? ' active' : '');
    dt.appendChild(d);
  });

  // Body
  document.getElementById('modalBody').innerHTML = `
    <div class="arabic-text">${card.ar.replace(/\n/g, '<br>')}</div>
    <div class="phonetic-text">${card.ph}</div>
    <div class="traduction-text">${card.tr}</div>
    <div class="contexte-block">
      <div class="contexte-label">&#9670; BIENFAIT &amp; CONTEXTE</div>
      <div class="contexte-text">${card.ctx}</div>
    </div>`;

  // Navigation
  document.getElementById('btnPrev').disabled = cardIdx === 0;
  document.getElementById('btnNext').style.display = isLast ? 'none' : 'inline-block';

  const vBtn = document.getElementById('btnValidate');
  if (isLast) {
    vBtn.classList.add('visible');
    if (maxed) {
      vBtn.textContent = '✓ MAX ATTEINT';
      vBtn.classList.add('maxed');
      vBtn.onclick = null;
    } else {
      const label = item.labels[sessions] || ('SESSION ' + (sessions + 1));
      vBtn.textContent = '✓ VALIDER — ' + label;
      vBtn.classList.remove('maxed');
      vBtn.onclick = validateAct;
    }
  } else {
    vBtn.classList.remove('visible');
  }
}

function nextCard() {
  const item = DEEN.find(i => i.id === activeId);
  if (cardIdx < CARDS[item.key].cards.length - 1) { cardIdx++; renderModal(); }
}
function prevCard() {
  if (cardIdx > 0) { cardIdx--; renderModal(); }
}

function validateAct() {
  const item     = DEEN.find(i => i.id === activeId);
  const sessions = deenState[activeId] || 0;
  if (sessions >= item.max) return;
  deenState[activeId] = sessions + 1;
  persist();
  renderDeen();
  const label = item.labels[sessions] || ('SESSION ' + (sessions + 1));
  showToast('✓ ' + item.name + ' — ' + label + ' (+' + item.xp + ' XP)');
  closeOverlay();
}

document.getElementById('deenOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeOverlay();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape')      closeOverlay();
  if (e.key === 'ArrowRight')  nextCard();
  if (e.key === 'ArrowLeft')   prevCard();
});

/* ─── OBSIDIAN SAVE ─── */
async function saveHabits() {
  const date  = getDate();
  const done  = HABITS.filter(h => habitsState[h.id]).length;
  const score = Math.round(done / HABITS.length * 100);
  const xp    = deenXpTotal();
  const note  = dayComment.trim();

  let content = `# HABITS — ${date}\n\n`;
  content += `**Score : ${score}% (${done}/${HABITS.length})**\n`;
  content += `**DEEN XP : ${xp} / 500**\n\n`;

  if (note) {
    content += `## Note du jour\n\n> ${note}\n\n`;
  }

  content += `## Rituels\n\n`;
  HABITS.forEach(h => { content += `- ${habitsState[h.id] ? '✅' : '❌'} ${h.name}\n`; });

  content += `\n## DEEN\n\n`;
  DEEN.forEach(item => {
    const s = deenState[item.id] || 0;
    const sessionInfo = item.max > 1 ? ` (${s}/${item.max})` : '';
    content += `- ${s > 0 ? '✅' : '❌'} ${item.name}${sessionInfo} | XP: +${s * item.xp}\n`;
  });

  const rawDone = RAWATIB.filter(r => rawatibState[r.id]);
  if (rawDone.length > 0) {
    content += `\n### Rawātib\n\n`;
    RAWATIB.forEach(r => {
      content += `- ${rawatibState[r.id] ? '✅' : '❌'} ${r.name} | XP: +${rawatibState[r.id] ? r.xp : 0}\n`;
    });
  }

  const muslimDay = xp >= 500;
  content += `\n## MUSLIM DAY\n\n`;
  content += `- ${muslimDay ? '✅' : '❌'} MUSLIM DAY — ${xp} / 500 XP DEEN\n`;
  content += muslimDay
    ? `- ⭐ Objectif DEEN atteint — journée complète\n`
    : `- ${500 - xp} XP manquants pour atteindre 500\n`;
  content += `\nDEEN_DATA — Total XP: ${xp} | Muslim Day: ${muslimDay ? 'OUI' : 'NON'}\n`;

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, date, filename: `CONTROL/HABITS/${date}.md`, section: 'HABITS' })
    });
    if (res.ok) {
      const btn = document.getElementById('submitBtn');
      btn.textContent = '✓ SAUVEGARDÉ';
      btn.classList.add('saved');
      setTimeout(() => { btn.textContent = 'SAUVEGARDER DANS OBSIDIAN'; btn.classList.remove('saved'); }, 3000);
      const md = xp >= 500 ? ' · ⭐ MUSLIM DAY' : '';
      showToast('✓ ' + done + '/' + HABITS.length + ' habits · ' + xp + ' XP' + md);
    } else { showToast('⚠ Erreur de sauvegarde'); }
  } catch(e) { showToast('⚠ Connexion impossible'); }
}

/* ─── UI UTILS ─── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setHeader() {
  const now    = new Date();
  const days   = ['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
  const months = ['JAN','FÉV','MAR','AVR','MAI','JUN','JUL','AOÛ','SEP','OCT','NOV','DÉC'];
  document.getElementById('dateDisplay').textContent = `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('dayDisplay').textContent  = days[now.getDay()];
}

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

/* ─── INIT ─── */
load();
setHeader();
renderHabits();
renderDeen();
renderRawatib();
updateScore();
updateClock();
// Restaurer le commentaire
if (dayComment) document.getElementById('dayComment').value = dayComment;
setInterval(updateClock, 10000);
</script>
</body>
</html>
