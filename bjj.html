<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJJ — MON JEU · ARNAUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0B0B10;
  --bg2:    #13131C;
  --bg3:    #1C1C28;
  --border: #252535;
  --text:   #EEEEF8;
  --dim:    #7070A0;
  --muted:  #3A3A55;

  --green:  #22C55E;
  --blue:   #3B82F6;
  --indigo: #818CF8;
  --violet: #6366F1;
  --orange: #F97316;
  --red:    #EF4444;
  --gold:   #FFB800;
  --purple: #A855F7;
  --slate:  #64748B;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(11,11,16,0.95);
  backdrop-filter: blur(12px);
  z-index: 100;
}
.header-title { font-size: 13px; font-weight: 700; letter-spacing: .15em; color: var(--text); }
.header-sub   { font-size: 11px; color: var(--dim); letter-spacing: .08em; margin-top: 2px; }
.header-back {
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--dim);
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  transition: all .2s;
}
.header-back:hover { color: var(--text); background: var(--bg3); }
.header-back.visible { display: flex; }
.chevron-left { font-size: 16px; }

/* ── VIEWS ── */
.view { display: none; }
.view.active {
  display: block;
  animation: fadeUp .28s cubic-bezier(.4,0,.2,1);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── HOME ── */
.home-intro {
  padding: 24px 20px 16px;
}
.home-intro h2 { font-size: 22px; font-weight: 800; line-height: 1.2; }
.home-intro p  { font-size: 13px; color: var(--dim); margin-top: 6px; line-height: 1.55; }

/* Flow strip */
.flow-strip {
  padding: 0 20px 20px;
  overflow-x: auto;
  scrollbar-width: none;
}
.flow-strip::-webkit-scrollbar { display: none; }
.flow-inner {
  display: flex;
  align-items: center;
  gap: 0;
  width: max-content;
}
.flow-node {
  display: flex;
  align-items: center;
  gap: 0;
}
.flow-pill {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  padding: 5px 10px;
  border-radius: 20px;
  border: 1.5px solid;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.flow-pill:hover { filter: brightness(1.2); transform: scale(1.04); }
.flow-arrow { color: var(--muted); font-size: 14px; padding: 0 6px; }

/* Position grid */
.pos-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 16px 32px;
}
@media(min-width:640px){ .pos-grid { grid-template-columns: repeat(3,1fr); } }
@media(min-width:900px){ .pos-grid { grid-template-columns: repeat(4,1fr); } }

.pos-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 14px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.pos-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 14px 14px 0 0;
  background: var(--c);
}
.pos-card:hover {
  border-color: var(--c);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.pos-card-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  margin-bottom: 12px;
  background: color-mix(in srgb, var(--c) 15%, transparent);
}
.pos-card-name { font-size: 13px; font-weight: 700; line-height: 1.2; }
.pos-card-sub  { font-size: 11px; color: var(--dim); margin-top: 2px; }
.pos-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}
.pos-card-cat {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .12em;
  padding: 3px 7px;
  border-radius: 6px;
  background: color-mix(in srgb, var(--c) 15%, transparent);
  color: var(--c);
}
.pos-card-count {
  font-size: 11px;
  color: var(--dim);
  font-weight: 600;
}

/* ── POSITION DETAIL ── */
.pos-detail { padding: 0 0 48px; }

.pos-hero {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.pos-hero::after {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, color-mix(in srgb, var(--pc) 18%, transparent), transparent 70%);
  pointer-events: none;
}
.pos-hero-cat {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .14em;
  color: var(--pc);
  margin-bottom: 8px;
}
.pos-hero-name {
  font-size: 28px;
  font-weight: 800;
  line-height: 1.1;
}
.pos-hero-sub {
  font-size: 14px;
  color: var(--dim);
  margin-top: 2px;
}
.pos-hero-obj {
  margin-top: 12px;
  font-size: 13px;
  color: var(--dim);
  line-height: 1.6;
  padding: 10px 12px;
  background: var(--bg2);
  border-left: 3px solid var(--pc);
  border-radius: 0 8px 8px 0;
}

/* Technique sections */
.tech-section { border-bottom: 1px solid var(--border); }
.tech-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
.tech-section-header:hover { background: var(--bg2); }
.tech-section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .14em;
  color: var(--dim);
  display: flex;
  align-items: center;
  gap: 8px;
}
.tech-section-title .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--pc);
  flex-shrink: 0;
}
.tech-section-count {
  font-size: 11px;
  color: var(--dim);
  background: var(--bg3);
  padding: 2px 8px;
  border-radius: 10px;
}
.tech-section-body {
  display: none;
  padding: 0 16px 16px;
}
.tech-section-body.open { display: block; animation: fadeUp .2s ease; }

/* Technique card */
.tech-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .2s;
}
.tech-card:hover { border-color: color-mix(in srgb, var(--pc) 50%, transparent); }
.tech-card.expanded { border-color: var(--pc); }

.tech-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
}
.tech-card-name { font-size: 14px; font-weight: 600; }
.tech-card-key  { font-size: 11px; color: var(--dim); margin-top: 3px; }
.tech-card-type {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  padding: 3px 8px;
  border-radius: 6px;
  flex-shrink: 0;
  margin-left: 8px;
}
.type-submission { background: rgba(239,68,68,.15); color: #EF4444; }
.type-sweep      { background: rgba(59,130,246,.15); color: #3B82F6; }
.type-takedown   { background: rgba(34,197,94,.15);  color: #22C55E; }
.type-transition { background: rgba(251,191,36,.15); color: #FBB724; }
.type-defense    { background: rgba(168,85,247,.15); color: #A855F7; }
.type-drill-type { background: rgba(100,116,139,.15); color: #94A3B8; }

.tech-card-body {
  display: none;
  padding: 0 16px 14px;
  border-top: 1px solid var(--border);
}
.tech-card-body.open { display: block; animation: fadeUp .18s ease; }

.steps-list { list-style: none; margin: 12px 0; }
.steps-list li {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--dim);
  line-height: 1.5;
}
.steps-list li:last-child { border-bottom: none; }
.step-num {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: color-mix(in srgb, var(--pc) 20%, transparent);
  color: var(--pc);
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.drill-box {
  background: color-mix(in srgb, var(--pc) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--pc) 25%, transparent);
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 10px;
  font-size: 12px;
  color: var(--pc);
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.drill-box .drill-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  color: var(--pc);
  flex-shrink: 0;
  margin-top: 2px;
}
.drill-box .drill-text { color: var(--text); font-size: 12px; }

.next-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.next-chip {
  font-size: 10px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--dim);
  cursor: pointer;
  transition: all .15s;
}
.next-chip:hover {
  border-color: var(--pc);
  color: var(--pc);
  background: color-mix(in srgb, var(--pc) 10%, transparent);
}
.next-label { font-size: 10px; color: var(--muted); margin-top: 8px; margin-bottom: 4px; letter-spacing: .08em; }

/* Drills section */
.drills-list { list-style: none; padding: 0 20px 16px; }
.drills-list li {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--dim);
}
.drills-list li:last-child { border-bottom: none; }
.drills-list .drill-icon { font-size: 16px; }

/* Rule */
.rule-box {
  margin: 0 20px;
  padding: 14px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  border-radius: 0 10px 10px 0;
  font-size: 12px;
  color: var(--dim);
  line-height: 1.6;
  font-style: italic;
}
.rule-box strong { color: var(--text); font-style: normal; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">BJJ — MON JEU</div>
    <div class="header-sub" id="headerSub">10 positions · A-game Arnaud</div>
  </div>
  <div class="header-back" id="backBtn" onclick="goHome()">
    <span class="chevron-left">←</span> Positions
  </div>
</div>

<!-- ══════════ HOME ══════════ -->
<div class="view active" id="view-home">
  <div class="home-intro">
    <h2>Mon A-Game</h2>
    <p>Clique sur une position pour voir les techniques, transitions et drills.</p>
  </div>

  <div class="flow-strip">
    <div class="flow-inner" id="flowInner"></div>
  </div>

  <div class="pos-grid" id="posGrid"></div>
</div>

<!-- ══════════ POSITION DETAIL ══════════ -->
<div class="view" id="view-position">
  <div class="pos-detail" id="posDetail"></div>
</div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const POSITIONS = [
  {
    id: 'debout',
    name: 'DEBOUT',
    sub: 'Standing',
    icon: '⬆',
    color: '#22C55E',
    cat: 'NEUTRE',
    obj: 'Aller au sol dans une position favorable. Prioriser le guard pull vers SLX — éviter de s\'exposer aux takedowns adverses.',

    techs: [

        name: 'Guard Pull → Single Leg X',

          'Avancer → saisir le pied extérieur (bas, près de la cheville)',

          'Pied sur la hanche adverse, pied derrière le genou (creux poplité)',

        ],
        drill: 'Entrée SLX sur jambe fictive × 20 par côté',
        next: ['slx']
      },
      {
        name: 'Double Leg Takedown',

        key: 'Penetration step → drive avant → finish',
        steps: [
          'Setup : fake jab ou collar tie pour casser la distance',
          'Penetration step (genou quasi au sol, pied d\'attaque entre les pieds adverses)',
          'Tête sur la hanche (JAMAIS dans l\'estomac — risque triangle)',
          'Bras autour des deux jambes, mains verrouillées derrière les genoux',
          'Drive vers l\'avant ou trip (Inner trip)'
        ],
        drill: 'Penetration step × 30 chaque jambe — focus sur la profondeur du step',
        next: ['side', 'garde_fermee']
      },
      {

        steps: [

          'Tête à l\'extérieur (outside head position — évite le guillotine)',
          'Élever la jambe vers la hanche',
          'Finish option 1 : Run the pipe (pousser le genou)',
          'Finish option 2 : Inside trip (croc pied intérieur)'
        ],
        drill: 'Shot bas × 20 — accent sur l\'outside head',
        next: ['side', 'garde_fermee']
      }
    ],
    drills: [
      '⚡ Penetration step × 30 (chaque jambe)',
      '⚡ Entrée SLX × 20 (chaque côté)',
      '⚡ Shot bas × 20'
    ]
  },
  {
    id: 'garde_fermee',
    name: 'GARDE FERMÉE',
    sub: 'Closed Guard',
    icon: '🛡',
    color: '#3B82F6',
    cat: 'GARDE',
    obj: 'Casser la posture adverse avant tout. Sans posture cassée = pas d\'attaque. Objectif prioritaire : triangle ou back take.',
    flow: true,
    techs: [
      {
        name: 'Triangle',
        type: 'submission',
        key: 'Casser posture → angle → verrouiller',
        steps: [
          'Casser la posture : pull fort sur la nuque',
          'Push/pull sur les bras : un bras dedans, un dehors',
          'Pivoter les hanches à 90° (angle est crucial)',
          'Passer la jambe derrière la tête → croiser les chevilles',
          'Ajuster l\'angle (perpendiculaire), couper avec le jarret',
          'Finition : tirer la tête vers le bas + étendre les hanches'
        ],
        drill: 'Pivots de hanche (pour angle triangle) × 30',
        next: ['back']
      },
      {
        name: 'Guillotine (High Elbow)',

        key: 'Contrôle tête → coude haut → rotation',
        steps: [
          'Saisir la tête : bras autour du cou (pas serrer encore)',
          'Monter le coude HAUT (high elbow guillotine)',
          'Main en supination (paume vers le ciel)',
          'Fermer les jambes si possible',
          'Finition : rotation des hanches + étendre le bras vers le plafond',
          'Depuis shoot défense : attraper avant l\'entrée complète'
        ],
        drill: 'Entrée guillotine sur foulard × 20',

      },
      {
        name: 'Kimura',

          'Casser la posture → attraper le poignet côté fort',
          'Main libre passe derrière le coude adverse → figure-4',
          'Verrouiller le figure-4 (poignet propre sur poignet adverse)',
          'Rotation : pousser le coude vers l\'arrière / le haut',
          'Si défense (bras verrouillé) : sweep hip bump ou back take'
        ],
        drill: 'Grip figure-4 × 20 (chaque côté)',
        next: ['back', 'garde_fermee']
      },
      {
        name: 'Armbar depuis garde',
        type: 'submission',
        key: 'Contrôle coude → pivot hanche → jambe tête',
        steps: [
          'Contrôler le coude adverse des deux mains',
          'Pivoter les hanches à 90° (même principe que triangle)',
          'Jambe sur l\'épaule adverse (pas sauter trop vite)',
          'Serrer les genoux → corps en ligne avec le bras',
          'Étendre les hanches vers le plafond (pas tirer avec les bras)'

        drill: 'Pivot armbar × 20',

      },
      {
        name: 'Hip Bump Sweep',

          'Ouvrir les jambes (ne plus avoir les pieds croisés)',
          'Monter sur les mains (s\'asseoir)',
          'Rotation des hanches vers l\'avant-haut',
          'Emmener l\'adversaire par-dessus',
          'Finir en mount',
          'COMBO : si résiste → Kimura immédiat'
        ],
        drill: 'Hip bump × 20',
        next: ['mount']
      },
      {
        name: 'Scissor Sweep',
        type: 'sweep',
        key: 'Contrôle manche+col → ciseau → kick',
        steps: [
          'Contrôle : saisir la manche + le col (ou épaule)',
          'Placer le genou sur le ventre adverse, autre jambe tendue derrière le genou adverse',
          'Ciseau les deux jambes simultanément',
          'Tirer la manche vers le bas en même temps'
        ],
        drill: 'Scissor sweep × 15 chaque côté',
        next: ['mount']
      }
    ],
    drills: [
      '⚡ Pivots de hanche (angle triangle/armbar) × 30',
      '⚡ Hip bump × 20',
      '⚡ Shrimping × 2 aller-retour (ouverture de garde)'

  },
  {
    id: 'slx',
    name: 'SINGLE LEG X',
    sub: 'SLX / X-Guard',
    icon: '✕',
    color: '#818CF8',
    cat: 'GARDE',
    obj: 'Déséquilibrer puis sweeper ou prendre le dos. Position offensive — ne pas rester statique. SLX = contrôle une jambe, X-Guard = deux.',
    flow: false,
    techs: [
      {
        name: 'Lifting Sweep (X-Guard)',
        type: 'sweep',
        key: 'Pied hanche + pied genou → extension → lever',

          'Autre pied derrière le genou adverse (creux poplité)',
          'Extension simultanée des deux jambes',
          'L\'adversaire décolle → se lever rapidement',
          'Finir debout ou en leg drag directement'

        drill: 'Lifting sweep sur partenaire (ou au mur) × 20',

      {

          'Chercher le RNC immédiatement'

        drill: 'Rotation vers le dos depuis SLX × 15',
        next: ['back']

      {
        name: 'Entrée Ankle Lock (no-gi)',
        type: 'submission',
        key: 'Contrôle jambe → rotation corps → pression cheville',
        steps: [
          'Saisir la cheville (pas le pied — la cheville)',
          'Coller l\'avant-bras contre le tendon d\'Achille',
          'Rotation du corps (rouler sur l\'épaule)',
          'Serrer fort le coude contre la hanche',
          'Extension → pression sur le tendon d\'Achille'
        ],
        drill: 'Grip ankle lock × 20',
        next: []
      }
    ],
    drills: [
      '⚡ Lifting sweep × 20',
      '⚡ Rotation vers le dos depuis SLX × 15',
      '⚡ Entrée SLX depuis debout × 20'
    ]
  },
  {
    id: 'demi_garde',
    name: 'DEMI-GARDE',
    sub: 'Half Guard',
    icon: '½',
    color: '#6366F1',
    cat: 'GARDE',
    obj: 'Ne pas rester plat — toujours sur le côté (underhook). Objectif : récupérer la garde complète ou prendre le dos via dogfight.',
    flow: false,
    techs: [
      {
        name: 'Dogfight → Back Take',
        type: 'transition',
        key: 'Underhook → monter → saisir ceinture → dos',
        steps: [
          'Obtenir le underhook (bras sous l\'aisselle adverse)',
          'Monter sur le coude puis sur le genou',
          'Arriver en position "chien de combat" (dogfight)',
          'Faire pivoter l\'adversaire → passer dans son dos',
          'Insérer les hooks → prise de dos'
        ],
        drill: 'Dogfight drill × 15 (chaque côté)',
        next: ['back']
      },
      {
        name: 'Old School Sweep',
        type: 'sweep',
        key: 'Attraper cheville adverse → tirer → rouler',
        steps: [
          'Depuis demi-garde : attraper la cheville adverse (celle bloquée)',
          'Tirer la cheville vers soi',
          'Rouler vers l\'arrière → adversaire perd l\'équilibre',
          'Finir en mount ou en side control'
        ],
        drill: 'Old school movement × 15',
        next: ['mount', 'side']
      }
    ],
    drills: [

// Flow order for the strip at the top
const FLOW_ORDER = ['debout','garde_fermee','slx','passage','side','mount','back'];

// ══════════════════════════════════════════
// STATE & NAVIGATION
// ══════════════════════════════════════════
let currentPos = null;
let openSections = {};
let openTechs = {};

function goHome() {
  currentPos = null;
  showView('home');
  document.getElementById('backBtn').classList.remove('visible');
  document.getElementById('headerSub').textContent = '10 positions · A-game Arnaud';
  openSections = {};
  openTechs = {};
}

function openPosition(id) {
  currentPos = POSITIONS.find(p => p.id === id);
  if (!currentPos) return;
  openSections = {};
  openTechs = {};
  renderPositionDetail(currentPos);
  showView('position');
  document.getElementById('backBtn').classList.add('visible');
  document.getElementById('headerSub').textContent = currentPos.name + ' — ' + currentPos.sub;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

// ══════════════════════════════════════════
// RENDER HOME
// ══════════════════════════════════════════
function renderHome() {
  // Flow strip
  const flowInner = document.getElementById('flowInner');
  FLOW_ORDER.forEach((id, i) => {
    const pos = POSITIONS.find(p => p.id === id);
    if (!pos) return;
    const pill = document.createElement('div');
    pill.className = 'flow-node';
    pill.innerHTML = `
      <div class="flow-pill" style="--c:${pos.color}; border-color:${pos.color}; color:${pos.color}; background:${pos.color}1A;" onclick="openPosition('${pos.id}')">
        ${pos.icon} ${pos.name}
      </div>
      ${i < FLOW_ORDER.length - 1 ? '<div class="flow-arrow">→</div>' : ''}
    `;
    flowInner.appendChild(pill);
  });

  // Position grid
  const grid = document.getElementById('posGrid');
  POSITIONS.forEach(pos => {
    const card = document.createElement('div');
    card.className = 'pos-card';
    card.style.setProperty('--c', pos.color);
    card.onclick = () => openPosition(pos.id);
    card.innerHTML = `
      <div class="pos-card-icon" style="background:${pos.color}20; color:${pos.color}; font-size:20px;">${pos.icon}</div>
      <div class="pos-card-name">${pos.name}</div>
      <div class="pos-card-sub">${pos.sub}</div>
      <div class="pos-card-footer">
        <div class="pos-card-cat" style="background:${pos.color}1A; color:${pos.color};">${pos.cat}</div>
        <div class="pos-card-count">${pos.techs.length} tech.</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════
// RENDER POSITION DETAIL
// ══════════════════════════════════════════
function renderPositionDetail(pos) {
  const detail = document.getElementById('posDetail');
  detail.style.setProperty('--pc', pos.color);

  const typeGroups = {
    submission: { label: 'SOUMISSIONS', techs: [] },
    sweep:      { label: 'SWEEPS',      techs: [] },
    takedown:   { label: 'TAKEDOWNS',   techs: [] },
    transition: { label: 'TRANSITIONS', techs: [] },
    defense:    { label: 'DÉFENSE',     techs: [] },
  };

  pos.techs.forEach(t => {
    if (typeGroups[t.type]) typeGroups[t.type].techs.push(t);
    else typeGroups.transition.techs.push(t);
  });

  let sectionsHTML = '';
  Object.entries(typeGroups).forEach(([type, g]) => {
    if (!g.techs.length) return;
    const sId = pos.id + '_' + type;
    sectionsHTML += `
      <div class="tech-section">
        <div class="tech-section-header" onclick="toggleSection('${sId}')">
          <div class="tech-section-title">
            <div class="dot"></div>${g.label}
          </div>
          <div class="tech-section-count">${g.techs.length}</div>
        </div>
        <div class="tech-section-body" id="sec-${sId}">
          ${g.techs.map(t => renderTechCard(pos, t)).join('')}
        </div>
      </div>
    `;
  });

  // Drills section
  const drillsHTML = pos.drills.map(d => `<li><span class="drill-icon">⚡</span>${d.replace('⚡ ','')}</li>`).join('');

  detail.innerHTML = `
    <div class="pos-hero">
      <div class="pos-hero-cat">${pos.cat}</div>
      <div class="pos-hero-name">${pos.name}</div>
      <div class="pos-hero-sub">${pos.sub}</div>
      <div class="pos-hero-obj">${pos.obj}</div>
    </div>
    ${sectionsHTML}
    <div class="tech-section">
      <div class="tech-section-header" onclick="toggleSection('${pos.id}_drills')">
        <div class="tech-section-title">
          <div class="dot"></div>DRILLS QUOTIDIENS
        </div>
        <div class="tech-section-count">${pos.drills.length}</div>
      </div>
      <div class="tech-section-body" id="sec-${pos.id}_drills">
        <ul class="drills-list">${drillsHTML}</ul>
      </div>
    </div>
    <div style="padding:20px 20px 0;">
      <div class="rule-box">
        <strong>Règle en sparring :</strong> je cherche mon A-game depuis ${pos.name}, même si je perds la position. C'est comme ça qu'on câble les techniques.
      </div>
    </div>
  `;
}

function renderTechCard(pos, tech) {
  const tId = pos.id + '_' + tech.name.replace(/\s+/g,'_');
  const typeClass = 'type-' + (tech.type === 'transition' ? 'transition' : tech.type === 'submission' ? 'submission' : tech.type === 'sweep' ? 'sweep' : tech.type === 'takedown' ? 'takedown' : tech.type === 'defense' ? 'defense' : 'transition');
  const typeLabel = tech.type === 'submission' ? 'SOUMISSION' : tech.type === 'sweep' ? 'SWEEP' : tech.type === 'takedown' ? 'TAKEDOWN' : tech.type === 'transition' ? 'TRANSITION' : 'DÉFENSE';

  const stepsHTML = tech.steps.map((s, i) => `
    <li><div class="step-num">${i+1}</div><span>${s}</span></li>
  `).join('');

  const nextHTML = tech.next && tech.next.length ? `
    <div class="next-label">TRANSITIONS VERS</div>
    <div class="next-chips">
      ${tech.next.map(id => {
        const p = POSITIONS.find(p => p.id === id);
        return p ? `<div class="next-chip" style="--pc:${p.color}" onclick="event.stopPropagation(); openPosition('${p.id}')">${p.icon} ${p.name}</div>` : '';
      }).join('')}
    </div>
  ` : '';

  return `
    <div class="tech-card" id="tech-${tId}" onclick="toggleTech('${tId}')">
      <div class="tech-card-header">
        <div>
          <div class="tech-card-name">${tech.name}</div>
          <div class="tech-card-key">${tech.key}</div>
        </div>
        <div class="tech-card-type ${typeClass}">${typeLabel}</div>
      </div>
      <div class="tech-card-body" id="tbody-${tId}">
        <ol class="steps-list">${stepsHTML}</ol>
        <div class="drill-box">
          <span class="drill-label">DRILL</span>
          <span class="drill-text">${tech.drill}</span>
        </div>
        ${nextHTML}
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════
function toggleSection(sId) {
  const body = document.getElementById('sec-' + sId);
  if (!body) return;
  openSections[sId] = !openSections[sId];
  body.classList.toggle('open', openSections[sId]);
}

function toggleTech(tId) {
  const body = document.getElementById('tbody-' + tId);
  const card = document.getElementById('tech-' + tId);
  if (!body || !card) return;
  openTechs[tId] = !openTechs[tId];
  body.classList.toggle('open', openTechs[tId]);
  card.classList.toggle('expanded', openTechs[tId]);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderHome();
