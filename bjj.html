<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJJ — MON JEU · ARNAUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #07070E;
  --bg2:   #0E0E18;
  --bg3:   #161622;
  --bd:    #1F1F30;
  --text:  #F2F2FF;
  --dim:   #6060A0;
  --muted: #30304A;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── VIEWS ── */
.view{display:none}
.view.active{display:block;animation:fadeUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ══ HOME ══ */
.home-header{
  padding:32px 20px 8px;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.home-title{font-size:32px;font-weight:900;letter-spacing:-.02em;line-height:1}
.home-title span{color:var(--dim);font-weight:300}
.home-badge{
  font-size:10px;font-weight:700;letter-spacing:.14em;
  padding:5px 10px;border-radius:20px;
  background:rgba(255,255,255,.06);color:var(--dim);
  border:1px solid var(--bd);
}

/* Flow strip */
.flow-wrap{padding:20px 20px 8px;overflow-x:auto;scrollbar-width:none}
.flow-wrap::-webkit-scrollbar{display:none}
.flow-row{display:flex;align-items:center;gap:0;width:max-content}
.flow-node{display:flex;align-items:center}
.flow-pill{
  font-size:11px;font-weight:700;letter-spacing:.06em;
  padding:7px 14px;border-radius:24px;
  border:1.5px solid var(--c);
  color:var(--c);background:color-mix(in srgb,var(--c) 12%,transparent);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.flow-pill:hover{background:color-mix(in srgb,var(--c) 25%,transparent);transform:scale(1.05)}
.flow-arrow{color:var(--muted);font-size:16px;padding:0 4px;user-select:none}

/* Section labels */
.section-label{
  padding:20px 20px 10px;
  font-size:10px;font-weight:700;letter-spacing:.18em;color:var(--dim);
}

/* Position cards grid */
.cards-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:0 14px 100px;
}
@media(min-width:600px){.cards-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.cards-grid{grid-template-columns:repeat(4,1fr)}}

.pos-card{
  border-radius:20px;
  padding:20px 16px 18px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  border:1px solid transparent;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  background:var(--bg2);
  min-height:150px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.pos-card::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,color-mix(in srgb,var(--c) 18%,transparent) 0%,transparent 60%);
  pointer-events:none;
}
.pos-card::after{
  content:'';position:absolute;
  top:-30px;right:-30px;width:100px;height:100px;
  border-radius:50%;
  background:radial-gradient(circle,color-mix(in srgb,var(--c) 22%,transparent),transparent 70%);
  pointer-events:none;
}
.pos-card:hover{
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 16px 40px rgba(0,0,0,.5),0 0 0 1px var(--c);
  border-color:var(--c);
}
.pos-card-icon{font-size:28px;line-height:1;margin-bottom:14px;position:relative;z-index:1}
.pos-card-top{position:relative;z-index:1}
.pos-card-cat{
  font-size:9px;font-weight:700;letter-spacing:.14em;
  color:var(--c);margin-bottom:6px;
}
.pos-card-name{font-size:15px;font-weight:800;line-height:1.1;letter-spacing:-.01em}
.pos-card-sub{font-size:11px;color:var(--dim);margin-top:3px}
.pos-card-bottom{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:14px;position:relative;z-index:1;
}
.pos-card-count{
  font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:12px;
  background:color-mix(in srgb,var(--c) 18%,transparent);
  color:var(--c);
}
.pos-card-arrow{color:var(--dim);font-size:14px}

/* ══ POSITION DETAIL ══ */
.pos-hero{
  position:relative;overflow:hidden;
  padding:0;
  min-height:220px;
  display:flex;flex-direction:column;justify-content:flex-end;
}
.pos-hero-bg{
  position:absolute;inset:0;
  background:linear-gradient(160deg,color-mix(in srgb,var(--pc) 30%,#07070E) 0%,#07070E 70%);
}
.pos-hero-glow{
  position:absolute;top:-60px;right:-60px;
  width:260px;height:260px;border-radius:50%;
  background:radial-gradient(circle,color-mix(in srgb,var(--pc) 25%,transparent),transparent 65%);
}
.pos-hero-content{position:relative;z-index:1;padding:32px 20px 24px}

/* Back button inside hero */
.btn-back{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12px;font-weight:600;
  color:rgba(255,255,255,.5);
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;padding:8px 16px;
  cursor:pointer;transition:all .2s;
  margin-bottom:20px;
  letter-spacing:.04em;
}
.btn-back:hover{background:rgba(255,255,255,.15);color:var(--text)}

.pos-hero-cat{
  font-size:10px;font-weight:700;letter-spacing:.18em;
  color:var(--pc);margin-bottom:8px;
}
.pos-hero-name{
  font-size:36px;font-weight:900;line-height:1;
  letter-spacing:-.02em;margin-bottom:4px;
}
.pos-hero-sub{font-size:14px;color:rgba(255,255,255,.5)}
.pos-hero-obj{
  margin-top:16px;
  font-size:13px;color:rgba(255,255,255,.65);
  line-height:1.65;padding:12px 14px;
  background:rgba(0,0,0,.3);
  border-left:3px solid var(--pc);
  border-radius:0 10px 10px 0;
  backdrop-filter:blur(8px);
}

/* Techniques */
.pos-content{padding:0 0 120px}
.tech-sec{border-bottom:1px solid var(--bd)}
.tech-sec-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;cursor:pointer;user-select:none;
  transition:background .15s;
}
.tech-sec-hd:hover{background:var(--bg2)}
.tech-sec-hd-left{display:flex;align-items:center;gap:10px}
.sec-dot{width:8px;height:8px;border-radius:50%;background:var(--pc);flex-shrink:0}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--dim)}
.sec-badge{
  font-size:10px;font-weight:700;
  padding:2px 9px;border-radius:10px;
  background:var(--bg3);color:var(--dim);
}
.sec-chevron{color:var(--dim);font-size:12px;transition:transform .2s}
.sec-chevron.open{transform:rotate(180deg)}
.tech-sec-body{display:none;padding:0 14px 14px}
.tech-sec-body.open{display:block;animation:fadeUp .2s ease}

/* Technique card */
.tech-card{
  background:var(--bg2);
  border:1px solid var(--bd);
  border-radius:14px;
  margin-bottom:8px;overflow:hidden;cursor:pointer;
  transition:border-color .2s,box-shadow .2s;
}
.tech-card:hover{border-color:color-mix(in srgb,var(--pc) 50%,transparent)}
.tech-card.expanded{
  border-color:var(--pc);
  box-shadow:0 4px 20px color-mix(in srgb,var(--pc) 15%,transparent);
}
.tech-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;gap:10px;
}
.tech-hd-left{flex:1;min-width:0}
.tech-name{font-size:14px;font-weight:700;line-height:1.2}
.tech-key{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.4}
.tech-type{
  font-size:9px;font-weight:700;letter-spacing:.08em;
  padding:4px 9px;border-radius:8px;flex-shrink:0;white-space:nowrap;
}
.t-submission{background:rgba(239,68,68,.15);color:#EF4444}
.t-sweep     {background:rgba(59,130,246,.15);color:#60A5FA}
.t-takedown  {background:rgba(34,197,94,.15);color:#4ADE80}
.t-transition{background:rgba(251,191,36,.15);color:#FCD34D}
.t-defense   {background:rgba(168,85,247,.15);color:#C084FC}

.tech-body{
  display:none;
  padding:0 16px 16px;
  border-top:1px solid var(--bd);
}
.tech-body.open{display:block;animation:fadeUp .18s ease}

.steps{list-style:none;margin:12px 0 0}
.steps li{
  display:flex;gap:10px;align-items:flex-start;
  padding:8px 0;border-bottom:1px solid var(--bd);
  font-size:13px;color:rgba(242,242,255,.7);line-height:1.55;
}
.steps li:last-child{border-bottom:none}
.step-n{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-top:1px;
  background:color-mix(in srgb,var(--pc) 20%,transparent);
  color:var(--pc);font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}

.drill-pill{
  display:flex;align-items:flex-start;gap:8px;
  margin-top:12px;padding:10px 12px;border-radius:10px;
  background:color-mix(in srgb,var(--pc) 8%,transparent);
  border:1px solid color-mix(in srgb,var(--pc) 22%,transparent);
}
.drill-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--pc);flex-shrink:0;margin-top:1px}
.drill-txt{font-size:12px;color:var(--text)}

.next-row{margin-top:12px}
.next-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--muted);margin-bottom:6px}
.next-chips{display:flex;flex-wrap:wrap;gap:6px}
.next-chip{
  font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;
  border:1px solid var(--bd);color:var(--dim);cursor:pointer;
  transition:all .15s;
}
.next-chip:hover{color:var(--pc);border-color:var(--pc);background:color-mix(in srgb,var(--pc) 10%,transparent)}

/* Drills list */
.drills-ul{list-style:none;padding:0 20px 12px}
.drills-ul li{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid var(--bd);
  font-size:13px;color:var(--dim);
}
.drills-ul li:last-child{border-bottom:none}
.di{font-size:18px}

/* Rule */
.rule{
  margin:0 16px;padding:14px 16px;
  background:rgba(255,184,0,.06);
  border:1px solid rgba(255,184,0,.2);
  border-left:3px solid #FFB800;
  border-radius:0 10px 10px 0;
  font-size:12px;color:var(--dim);line-height:1.65;
  font-style:italic;
}
.rule strong{color:var(--text);font-style:normal}

/* Floating back button */
.fab-back{
  position:fixed;bottom:28px;left:20px;
  display:none;align-items:center;gap:8px;
  padding:12px 20px;border-radius:30px;
  background:var(--bg3);border:1px solid var(--bd);
  color:var(--text);font-size:13px;font-weight:600;
  cursor:pointer;z-index:200;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  transition:all .2s;
}
.fab-back:hover{background:var(--bg2);transform:scale(1.03)}
.fab-back.visible{display:flex;animation:fadeUp .25s ease}
</style>
</head>
<body>

<!-- ══════════ HOME ══════════ -->
<div class="view active" id="view-home">
  <div class="home-header">
    <div>
      <div class="home-title">MON JEU<br><span>BJJ</span></div>
    </div>
    <div class="home-badge">10 POSITIONS</div>
  </div>

  <div class="flow-wrap">
    <div class="flow-row" id="flowRow"></div>
  </div>

  <div class="section-label">TOUTES LES POSITIONS</div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- ══════════ POSITION DETAIL ══════════ -->
<div class="view" id="view-pos">
  <div id="posHero"></div>
  <div class="pos-content" id="posContent"></div>
</div>

<!-- Floating back button -->
<div class="fab-back" id="fabBack" onclick="goHome()">
  ← POSITIONS
</div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const POS = [
  {
    id:'debout', name:'DEBOUT', sub:'Standing', icon:'⬆', color:'#22C55E', cat:'NEUTRE',
    obj:'Aller au sol dans une position favorable. Prioriser le guard pull vers SLX — éviter de s\'exposer aux takedowns adverses.',
    flow:true,
    techs:[
      { name:'Guard Pull → Single Leg X', type:'transition', key:'Saisir le pied → s\'asseoir → hooks SLX',

        drill:'Penetration step × 30 chaque jambe', next:['side','garde_fermee'] },
      { name:'Single Leg Takedown', type:'takedown', key:'Shot bas → saisir genou → élever → finish',
        steps:['Shot bas → saisir derrière le genou','Tête à l\'extérieur (évite le guillotine)','Élever la jambe vers la hanche','Finish : Run the pipe ou Inside trip'],
        drill:'Shot bas × 20', next:['side','garde_fermee'] }
    ],
    drills:['Penetration step × 30 chaque jambe','Entrée SLX × 20 chaque côté','Shot bas × 20']
  },
  {
    id:'garde_fermee', name:'GARDE FERMÉE', sub:'Closed Guard', icon:'🛡', color:'#3B82F6', cat:'GARDE',
    obj:'Casser la posture avant tout. Sans posture cassée = pas d\'attaque. Objectif : triangle ou back take.',
    flow:true,
    techs:[
      { name:'Triangle', type:'submission', key:'Casser posture → angle 90° → verrouiller',
        steps:['Casser la posture : pull fort sur la nuque','Push/pull sur les bras (un dedans, un dehors)','Pivoter les hanches à 90° — l\'angle est crucial','Passer la jambe derrière la tête → croiser','Couper avec le jarret + tirer tête vers le bas'],

      { name:'Guillotine (High Elbow)', type:'submission', key:'Coude haut → rotation hanches → fermer les jambes',

      { name:'Armbar depuis garde', type:'submission', key:'Contrôle coude → pivot 90° → jambe tête',
        steps:['Contrôler le coude adverse des deux mains','Pivoter les hanches à 90°','Jambe sur l\'épaule adverse','Serrer les genoux → corps aligné avec le bras','Étendre les hanches (pas tirer avec les bras)'],
        drill:'Pivot armbar × 20', next:[] },
      { name:'Hip Bump Sweep', type:'sweep', key:'Ouvrir garde → monter sur mains → rotation',
        steps:['Ouvrir les jambes','Monter sur les mains (s\'asseoir)','Rotation des hanches vers l\'avant-haut','Emmener l\'adversaire par-dessus','COMBO si résiste → Kimura immédiat'],
        drill:'Hip bump × 20', next:['mount'] },
      { name:'Scissor Sweep', type:'sweep', key:'Manche+col → ciseau → kick',
        steps:['Contrôle : manche + col','Genou sur le ventre, autre jambe tendue derrière le genou','Ciseau simultané des deux jambes','Tirer la manche vers le bas simultanément'],

  {
    id:'slx', name:'SINGLE LEG X', sub:'SLX / X-Guard', icon:'✕', color:'#818CF8', cat:'GARDE',

      { name:'Lifting Sweep (X-Guard)', type:'sweep', key:'Pied hanche + pied genou → extension → lever',

        drill:'Lifting sweep × 20', next:['side','debout'] },
      { name:'Back Take depuis SLX', type:'transition', key:'Rotation intérieure → passer derrière → hooks',
        steps:['Pivoter vers l\'intérieur (côté jambe contrôlée)','Lâcher les hooks → passer les bras autour de la taille','Se lever derrière l\'adversaire','Insérer les deux hooks','Chercher le RNC immédiatement'],

      { name:'Ankle Lock (no-gi)', type:'submission', key:'Cheville → avant-bras tendon → rotation corps',

    ],
    drills:['Lifting sweep × 20','Rotation vers le dos × 15','Entrée SLX × 20']
  },
  {
    id:'demi_garde', name:'DEMI-GARDE', sub:'Half Guard', icon:'½', color:'#6366F1', cat:'GARDE',

    techs:[
      { name:'Dogfight → Back Take', type:'transition', key:'Underhook → monter → saisir ceinture → dos',

    techs:[
      { name:'Leg Drag', type:'transition', key:'Pied + mollet → passer jambe → pression latérale',

      { name:'Knee Slice', type:'transition', key:'Main sur genou → genoux en diagonale → flatten',

      { name:'Torreando', type:'transition', key:'Saisir 2 chevilles → pousser → pivoter de côté',

        drill:'Torreando × 20', next:['side'] }
    ],
    drills:['Leg drag × 20 chaque côté','Knee slice × 20','Passage complet → side control × 10']
  },
  {
    id:'side', name:'CONTRÔLE LATÉRAL', sub:'Side Control', icon:'◀', color:'#EF4444', cat:'CONTRÔLE',
    obj:'Maintenir la pression — ne jamais permettre de récupérer les coudes. Monter en mount, prendre le dos ou soumettre.',
    flow:true,
    techs:[
      { name:'Americana', type:'submission', key:'Poignet → figure-L → rotation vers le haut',
        steps:['Contrôler le bras proche : saisir le poignet','Autre main au-dessus du coude','Amener le bras en figure-L (coude 90°)','Pousser le coude vers le sol → poignet vers le haut'],
        drill:'Grip americana × 20', next:[] },
      { name:'Kimura (depuis side)', type:'submission', key:'Poignet → figure-4 → rotation épaule',
        steps:['Saisir le poignet adverse (bras proche)','Passer le bras par-dessus → figure-4','Monter si nécessaire pour dégager','Rotation : pousser vers l\'arrière + vers le haut','SI résiste → back take direct'],
        drill:'Kimura side × 15', next:['back'] },
      { name:'Arm Triangle', type:'submission', key:'Bras adverse contre son cou → clavicule carotide',
        steps:['Amener le bras contre son propre cou','Poser ma clavicule sur sa carotide libre','Figure-4 sur ma propre tête','Passer du côté du bras bloqué','Aplatir et pression → 2 carotides bloquées'],
        drill:'Setup arm triangle × 15', next:[] },
      { name:'→ Mont', type:'transition', key:'Knee on belly → monter le genou',

const FLOW_IDS = ['debout','garde_fermee','slx','passage','side','mount','back'];

// ══════════════════════════════════════════
// STATE & NAV
// ══════════════════════════════════════════
let openSecs = {}, openTechs = {};

function goHome() {
  document.getElementById('view-pos').classList.remove('active');
  document.getElementById('view-home').classList.add('active');
  document.getElementById('fabBack').classList.remove('visible');
  openSecs = {}; openTechs = {};
  window.scrollTo({top:0,behavior:'smooth'});
}

function openPos(id) {
  const pos = POS.find(p => p.id === id);
  if (!pos) return;
  openSecs = {}; openTechs = {};
  buildPosDetail(pos);
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-pos').classList.add('active');
  document.getElementById('fabBack').classList.add('visible');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════════
// RENDER HOME
// ══════════════════════════════════════════
function renderHome() {
  // Flow strip
  const row = document.getElementById('flowRow');
  FLOW_IDS.forEach((id, i) => {
    const p = POS.find(x => x.id === id);
    const node = document.createElement('div');
    node.className = 'flow-node';
    node.innerHTML = `
      <div class="flow-pill" style="--c:${p.color}" onclick="openPos('${p.id}')">${p.icon} ${p.name}</div>
      ${i < FLOW_IDS.length-1 ? '<div class="flow-arrow">→</div>' : ''}
    `;
    row.appendChild(node);
  });

  // Cards
  const grid = document.getElementById('cardsGrid');
  POS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'pos-card';
    card.style.setProperty('--c', p.color);
    card.onclick = () => openPos(p.id);
    card.innerHTML = `
      <div class="pos-card-top">
        <div class="pos-card-cat">${p.cat}</div>
        <div class="pos-card-icon">${p.icon}</div>
        <div class="pos-card-name">${p.name}</div>
        <div class="pos-card-sub">${p.sub}</div>
      </div>
      <div class="pos-card-bottom">
        <div class="pos-card-count">${p.techs.length} techniques</div>
        <div class="pos-card-arrow">→</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════
// RENDER POSITION DETAIL
// ══════════════════════════════════════════
function buildPosDetail(pos) {
  const hero = document.getElementById('posHero');
  const content = document.getElementById('posContent');
  hero.style.setProperty('--pc', pos.color);
  content.style.setProperty('--pc', pos.color);

  hero.innerHTML = `
    <div class="pos-hero">
      <div class="pos-hero-bg"></div>
      <div class="pos-hero-glow"></div>
      <div class="pos-hero-content">
        <div class="btn-back" onclick="goHome()">← Retour aux positions</div>
        <div class="pos-hero-cat">${pos.cat}</div>
        <div class="pos-hero-name">${pos.name}</div>
        <div class="pos-hero-sub">${pos.sub}</div>
        <div class="pos-hero-obj">${pos.obj}</div>
      </div>
    </div>
  `;

  // Group techniques by type
  const groups = [
    { key:'submission', label:'SOUMISSIONS' },
    { key:'sweep',      label:'SWEEPS' },
    { key:'takedown',   label:'TAKEDOWNS' },
    { key:'transition', label:'TRANSITIONS' },
    { key:'defense',    label:'DÉFENSE' },
  ];

  let html = '';
  groups.forEach(g => {
    const techs = pos.techs.filter(t => t.type === g.key);
    if (!techs.length) return;
    const sid = pos.id + '_' + g.key;
    html += `
      <div class="tech-sec">
        <div class="tech-sec-hd" onclick="toggleSec('${sid}')">
          <div class="tech-sec-hd-left">
            <div class="sec-dot"></div>
            <div class="sec-title">${g.label}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="sec-badge">${techs.length}</div>
            <div class="sec-chevron" id="chev-${sid}">▼</div>
          </div>
        </div>
        <div class="tech-sec-body" id="sec-${sid}">
          ${techs.map(t => buildTechCard(pos, t)).join('')}
        </div>
      </div>
    `;
  });

  // Drills
  const dsid = pos.id + '_drills';
  html += `
    <div class="tech-sec">
      <div class="tech-sec-hd" onclick="toggleSec('${dsid}')">
        <div class="tech-sec-hd-left">
          <div class="sec-dot"></div>
          <div class="sec-title">DRILLS QUOTIDIENS</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="sec-badge">${pos.drills.length}</div>
          <div class="sec-chevron" id="chev-${dsid}">▼</div>
        </div>
      </div>
      <div class="tech-sec-body" id="sec-${dsid}">
        <ul class="drills-ul">
          ${pos.drills.map(d => `<li><span class="di">⚡</span>${d.replace('⚡ ','')}</li>`).join('')}
        </ul>
      </div>
    </div>
    <div style="padding:20px 16px 0">
      <div class="rule"><strong>Règle sparring :</strong> je cherche mon A-game depuis ${pos.name} même si je perds la position. C'est comme ça qu'on câble les techniques.</div>
    </div>
  `;

  content.innerHTML = html;
}

function buildTechCard(pos, tech) {
  const tid = pos.id + '_' + tech.name.replace(/[\s→\/\(\)]/g,'_');
  const cls = { submission:'t-submission', sweep:'t-sweep', takedown:'t-takedown', transition:'t-transition', defense:'t-defense' }[tech.type] || 't-transition';
  const lbl = { submission:'SOUMISSION', sweep:'SWEEP', takedown:'TAKEDOWN', transition:'TRANSITION', defense:'DÉFENSE' }[tech.type] || 'TRANSITION';

  const stepsHtml = tech.steps.map((s,i) => `
    <li><div class="step-n">${i+1}</div><span>${s}</span></li>
  `).join('');

  const nextHtml = tech.next && tech.next.length ? `
    <div class="next-row">
      <div class="next-lbl">TRANSITION VERS</div>
      <div class="next-chips">
        ${tech.next.map(nid => {
          const np = POS.find(p => p.id === nid);
          return np ? `<div class="next-chip" onclick="event.stopPropagation();openPos('${np.id}')" style="--pc:${np.color}">${np.icon} ${np.name}</div>` : '';
        }).join('')}
      </div>
    </div>
  ` : '';

  return `
    <div class="tech-card" id="tc-${tid}" onclick="toggleTech('${tid}')">
      <div class="tech-hd">
        <div class="tech-hd-left">
          <div class="tech-name">${tech.name}</div>
          <div class="tech-key">${tech.key}</div>
        </div>
        <div class="tech-type ${cls}">${lbl}</div>
      </div>
      <div class="tech-body" id="tb-${tid}">
        <ul class="steps">${stepsHtml}</ul>
        <div class="drill-pill">
          <span class="drill-lbl">DRILL</span>
          <span class="drill-txt">${tech.drill}</span>
        </div>
        ${nextHtml}
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════
function toggleSec(sid) {
  openSecs[sid] = !openSecs[sid];
  const body = document.getElementById('sec-'+sid);
  const chev = document.getElementById('chev-'+sid);
  if (body) body.classList.toggle('open', openSecs[sid]);
  if (chev) chev.classList.toggle('open', openSecs[sid]);
}

function toggleTech(tid) {
  openTechs[tid] = !openTechs[tid];
  const body = document.getElementById('tb-'+tid);
  const card = document.getElementById('tc-'+tid);
  if (body) body.classList.toggle('open', openTechs[tid]);
  if (card) card.classList.toggle('expanded', openTechs[tid]);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderHome();
</script>
