<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BJJ — MON JEU</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#06060D;font-family:'Outfit',sans-serif;color:#F0F0FF}

/* LAYOUT */
.layout{display:flex;height:100vh;width:100vw;position:relative;overflow:hidden}
.canvas-wrap{flex:1;position:relative;min-width:0}
canvas{display:block;width:100%;height:100%}

/* HUD top */
.hud{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px 0;pointer-events:none;
}
.hud-title{font-size:13px;font-weight:800;letter-spacing:.18em;color:rgba(255,255,255,.9)}
.hud-sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.1em}
.hud-hint{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.08em;text-align:right}

/* RIGHT PANEL */
.panel{
  width:380px;flex-shrink:0;
  background:#0D0D1A;
  border-left:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  position:relative;z-index:20;
  overflow:hidden;
}
.panel.open{transform:translateX(0)}

/* Panel header */
.panel-header{
  padding:20px 18px 16px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.06);
  position:relative;
}
.panel-close{
  position:absolute;top:16px;right:16px;
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.5);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
}
.panel-close:hover{background:rgba(255,255,255,.12);color:#fff}
.panel-cat{font-size:10px;font-weight:700;letter-spacing:.18em;margin-bottom:6px}
.panel-name{font-size:24px;font-weight:900;letter-spacing:-.02em;line-height:1}
.panel-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:3px}
.panel-obj{
  font-size:11px;color:rgba(255,255,255,.55);line-height:1.6;
  margin-top:12px;padding:9px 11px;
  background:rgba(255,255,255,.04);
  border-left:3px solid var(--pc);
  border-radius:0 8px 8px 0;
}

/* Panel scroll */
.panel-scroll{overflow-y:auto;flex:1;padding-bottom:32px}
.panel-scroll::-webkit-scrollbar{width:3px}
.panel-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* Sections */
.sec{border-bottom:1px solid rgba(255,255,255,.05)}
.sec-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;cursor:pointer;user-select:none;transition:background .15s;
}
.sec-hd:hover{background:rgba(255,255,255,.03)}
.sec-hd-l{display:flex;align-items:center;gap:9px}
.sec-dot{width:7px;height:7px;border-radius:50%;background:var(--pc);flex-shrink:0}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.15em;color:rgba(255,255,255,.4)}
.sec-count{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.35)}
.sec-chev{color:rgba(255,255,255,.25);font-size:11px;transition:transform .2s}
.sec-chev.o{transform:rotate(180deg)}
.sec-body{display:none;padding:0 10px 10px}
.sec-body.o{display:block;animation:fu .18s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Tech card */
.tc{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:10px;margin-bottom:6px;overflow:hidden;cursor:pointer;
  transition:border-color .2s;
}
.tc:hover{border-color:rgba(255,255,255,.14)}
.tc.exp{border-color:var(--pc);box-shadow:0 0 18px color-mix(in srgb,var(--pc) 10%,transparent)}
.tc-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;gap:8px}
.tc-name{font-size:12px;font-weight:700}
.tc-key{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;line-height:1.4}
.tc-tag{font-size:9px;font-weight:700;letter-spacing:.07em;padding:3px 7px;border-radius:7px;flex-shrink:0;white-space:nowrap}
.tag-s{background:rgba(239,68,68,.18);color:#F87171}
.tag-sw{background:rgba(59,130,246,.18);color:#60A5FA}
.tag-td{background:rgba(34,197,94,.18);color:#4ADE80}
.tag-tr{background:rgba(251,191,36,.18);color:#FCD34D}
.tag-d{background:rgba(168,85,247,.18);color:#C084FC}
.tc-body{display:none;padding:0 13px 12px;border-top:1px solid rgba(255,255,255,.06)}
.tc-body.o{display:block;animation:fu .15s ease}
.steps{list-style:none;margin:10px 0 0}
.steps li{
  display:flex;gap:9px;align-items:flex-start;
  padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);
  font-size:11px;color:rgba(255,255,255,.6);line-height:1.5;
}
.steps li:last-child{border-bottom:none}
.sn{
  width:18px;height:18px;border-radius:50%;flex-shrink:0;margin-top:1px;
  background:color-mix(in srgb,var(--pc) 18%,transparent);
  color:var(--pc);font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.drill-b{
  display:flex;gap:8px;margin-top:9px;padding:8px 10px;border-radius:8px;
  background:color-mix(in srgb,var(--pc) 7%,transparent);
  border:1px solid color-mix(in srgb,var(--pc) 20%,transparent);
}
.drill-l{font-size:9px;font-weight:700;letter-spacing:.09em;color:var(--pc);flex-shrink:0;margin-top:1px}
.drill-t{font-size:11px;color:rgba(255,255,255,.8)}
.next-r{margin-top:9px}
.next-l{font-size:9px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.2);margin-bottom:5px}
.next-chips{display:flex;flex-wrap:wrap;gap:5px}
.nchip{
  font-size:10px;font-weight:600;padding:4px 10px;border-radius:16px;
  border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);
  cursor:pointer;transition:all .15s;
}
.nchip:hover{color:var(--pc);border-color:var(--pc)}

/* Drills list */
.drills-ul{list-style:none;padding:6px 13px 4px}
.drills-ul li{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);
  font-size:11px;color:rgba(255,255,255,.5);
}
.drills-ul li:last-child{border-bottom:none}

/* Legend */
.legend{
  position:absolute;bottom:20px;right:16px;z-index:10;
  display:flex;flex-direction:column;gap:5px;pointer-events:none;
}
.leg-item{display:flex;align-items:center;gap:7px}
.leg-dot{width:8px;height:8px;border-radius:50%}
.leg-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;color:rgba(255,255,255,.3)}

/* Mobile: panel full width overlay */
@media(max-width:640px){
  .panel{
    position:fixed;inset:0;width:100%;
    border-left:none;border-top:1px solid rgba(255,255,255,.07);
    border-radius:20px 20px 0 0;
    top:auto;height:80vh;
    transform:translateY(100%);
    transition:transform .3s cubic-bezier(.4,0,.2,1);
  }
  .panel.open{transform:translateY(0)}
  .legend{display:none}
}
</style>
</head>

const EDGES = [
  {f:'debout',       t:'garde_fermee'},{f:'debout',      t:'slx'},     {f:'debout',     t:'passage'},
  {f:'garde_fermee', t:'back'},        {f:'garde_fermee',t:'mount'},   {f:'garde_fermee',t:'escape'},{f:'garde_fermee',t:'demi_garde'},
  {f:'slx',          t:'back'},        {f:'slx',         t:'side'},    {f:'slx',        t:'demi_garde'},
  {f:'demi_garde',   t:'back'},        {f:'demi_garde',  t:'escape'},  {f:'demi_garde', t:'mount'},
  {f:'passage',      t:'side'},
  {f:'side',         t:'mount'},       {f:'side',        t:'back'},    {f:'side',       t:'escape'},
  {f:'mount',        t:'back'},        {f:'mount',       t:'escape'},
  {f:'escape',       t:'garde_fermee'},{f:'escape',      t:'demi_garde'},
  {f:'turtle',       t:'garde_fermee'},{f:'turtle',      t:'slx'},     {f:'turtle',     t:'side'},
];

// ══════════════════════════════════════════════════════
// CANVAS
// ══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR, nodes, panelOpen = false, activeId = null;
let openSecs = {}, openTechs = {};
let t0 = Date.now();

function resize() {
  DPR = window.devicePixelRatio || 1;
  const wrap = document.getElementById('canvasWrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(DPR, DPR);
  buildNodes();
}

function buildNodes() {
  nodes = POS.map(p => {
    const baseR = p.id === 'back' ? 34 : p.id === 'debout' ? 28 : 24;
    return {
      ...p,
      x: p.nx * W,
      y: p.ny * H + 50,
      r: baseR,
      phase: Math.random() * Math.PI * 2
    };
  });
}

function getNode(id) { return nodes.find(n => n.id === id); }

// ── DRAW ──
function draw() {
  const t = (Date.now() - t0) / 1000;
  ctx.clearRect(0, 0, W, H);

  drawStars(t);

  EDGES.forEach(e => {
    const a = getNode(e.f), b = getNode(e.t);
    if (!a || !b) return;
    const active = activeId && (e.f === activeId || e.t === activeId);
    const alpha = active ? 0.55 : 0.12;
    const w = active ? 1.5 : 0.8;
    const pulsedAlpha = active ? alpha + Math.sin(t * 3) * 0.1 : alpha;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = active ? `rgba(255,255,255,${pulsedAlpha})` : `rgba(100,100,180,${alpha})`;
    ctx.lineWidth = w;
    if (!active) ctx.setLineDash([4, 8]);
    else ctx.setLineDash([]);
    ctx.shadowColor = active ? '#ffffff' : 'transparent';
    ctx.shadowBlur  = active ? 6 : 0;
    ctx.stroke();
    ctx.restore();

    if (active) drawArrow(a, b);
  });

  nodes.forEach(n => {
    const breathe = 1 + Math.sin(t * 1.2 + n.phase) * 0.05;
    const r = n.r * breathe;
    const isActive = n.id === activeId;
    const alpha = isActive ? 1 : (activeId ? 0.45 : 1);

    const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 2.8);
    grd.addColorStop(0, hexAlpha(n.color, 0.18 * alpha));
    grd.addColorStop(1, hexAlpha(n.color, 0));
    ctx.beginPath();
    ctx.arc(n.x, n.y, r * 2.8, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.fill();

    const grd2 = ctx.createRadialGradient(n.x - r*0.3, n.y - r*0.3, 0, n.x, n.y, r);
    grd2.addColorStop(0, hexAlpha(n.color, 0.5 * alpha));
    grd2.addColorStop(1, hexAlpha(n.color, 0.15 * alpha));
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = grd2;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.strokeStyle = hexAlpha(n.color, (isActive ? 1 : 0.6) * alpha);
    ctx.lineWidth = isActive ? 2 : 1;
    ctx.shadowColor = n.color;
    ctx.shadowBlur  = isActive ? 24 : 10;
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.font = `${r * 0.72}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = alpha;
    ctx.fillText(n.icon, n.x, n.y);
    ctx.globalAlpha = 1;

    ctx.font = `700 ${Math.min(11, r * 0.38)}px Outfit`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = hexAlpha(n.color, 0.85 * alpha);
    ctx.shadowColor = n.color;
    ctx.shadowBlur  = isActive ? 8 : 3;
    ctx.fillText(n.name, n.x, n.y + r + 5);
    ctx.shadowBlur = 0;
  });

  requestAnimationFrame(draw);
}

function drawArrow(a, b) {
  const angle = Math.atan2(b.y - a.y, b.x - a.x);
  const nb = getNode(b.id);
  const tip = { x: b.x - Math.cos(angle) * nb.r, y: b.y - Math.sin(angle) * nb.r };
  const size = 7;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(tip.x, tip.y);
  ctx.lineTo(tip.x - Math.cos(angle-0.4)*size, tip.y - Math.sin(angle-0.4)*size);
  ctx.lineTo(tip.x - Math.cos(angle+0.4)*size, tip.y - Math.sin(angle+0.4)*size);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fill();
  ctx.restore();
}

let stars = [];
function initStars() {
  stars = Array.from({length:80}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.2 + 0.2,
    alpha: Math.random() * 0.4 + 0.05,
    phase: Math.random() * Math.PI * 2
  }));
}
function drawStars(t) {
  stars.forEach(s => {
    const a = s.alpha * (0.6 + 0.4 * Math.sin(t * 0.5 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(180,180,255,${a})`;
    ctx.fill();
  });
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── HIT TEST ──
function hitTest(cx, cy) {
  for (const n of nodes) {
    const dx = cx - n.x, dy = cy - n.y;
    if (dx*dx + dy*dy <= (n.r + 14) * (n.r + 14)) return n;
  }
  return null;
}

canvas.addEventListener('pointerdown', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const hit = hitTest(x, y);
  if (hit) openNode(hit);
  else if (!panelOpen) { activeId = null; }
});

// ══════════════════════════════════════════════════════
// PANEL
// ══════════════════════════════════════════════════════
function openNode(node) {
  activeId = node.id;
  openSecs = {}; openTechs = {};
  const panel = document.getElementById('panel');
  panel.style.setProperty('--pc', node.color);
  buildPanel(node);
  panel.classList.add('open');
  panelOpen = true;
  // Scroll panel to top
  document.getElementById('panelBody').scrollTop = 0;
  // Update HUD hint
  document.getElementById('hudHint').innerHTML = '';
  // Trigger canvas resize to account for panel width
  setTimeout(resize, 310);
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  panelOpen = false;
  activeId = null;
  document.getElementById('hudHint').innerHTML = 'APPUYER SUR<br>UN NŒUD';
  setTimeout(resize, 310);
}

function goTo(nodeId) {
  const n = nodes.find(x => x.id === nodeId);
  if (n) {
    openSecs = {}; openTechs = {};
    activeId = n.id;
    const panel = document.getElementById('panel');
    panel.style.setProperty('--pc', n.color);
    buildPanel(n);
    document.getElementById('panelBody').scrollTop = 0;
  }
}

function buildPanel(pos) {
  const hdr = document.getElementById('panelHeader');
  hdr.innerHTML = `
    <div class="panel-close" onclick="closePanel()">✕</div>
    <div class="panel-cat" style="color:${pos.color}">${pos.cat}</div>
    <div class="panel-name">${pos.name}</div>
    <div class="panel-sub">${pos.sub}</div>
    <div class="panel-obj">${pos.obj}</div>
  `;

  const groups = [
    {key:'s',  label:'SOUMISSIONS'},
    {key:'sw', label:'SWEEPS'},
    {key:'td', label:'TAKEDOWNS'},
    {key:'tr', label:'TRANSITIONS'},
    {key:'d',  label:'DÉFENSE'},
  ];

  let html = '';
  groups.forEach(g => {
    const techs = pos.techs.filter(t => t.type === g.key);
    if (!techs.length) return;
    const sid = pos.id + '_' + g.key;
    html += `
      <div class="sec">
        <div class="sec-hd" onclick="toggleSec('${sid}')">
          <div class="sec-hd-l">
            <div class="sec-dot"></div>
            <div class="sec-title">${g.label}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="sec-count">${techs.length}</div>
            <div class="sec-chev" id="chev-${sid}">▼</div>
          </div>
        </div>
        <div class="sec-body" id="sec-${sid}">
          ${techs.map(t => buildTechCard(pos, t)).join('')}
        </div>
      </div>
    `;
  });

  const dsid = pos.id + '_dr';
  html += `
    <div class="sec">
      <div class="sec-hd" onclick="toggleSec('${dsid}')">
        <div class="sec-hd-l"><div class="sec-dot"></div><div class="sec-title">DRILLS QUOTIDIENS</div></div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="sec-count">${pos.drills.length}</div>
          <div class="sec-chev" id="chev-${dsid}">▼</div>
        </div>
      </div>
      <div class="sec-body" id="sec-${dsid}">
        <ul class="drills-ul">
          ${pos.drills.map(d=>`<li>⚡ ${d}</li>`).join('')}
        </ul>
      </div>
    </div>
  `;

  document.getElementById('panelBody').innerHTML = html;
}

function buildTechCard(pos, tech) {
  const tid = pos.id + '_' + tech.name.replace(/[\s→\/\(\)\*]/g,'_');
  const cls = {s:'tag-s',sw:'tag-sw',td:'tag-td',tr:'tag-tr',d:'tag-d'}[tech.type]||'tag-tr';
  const lbl = {s:'SOUMISSION',sw:'SWEEP',td:'TAKEDOWN',tr:'TRANSITION',d:'DÉFENSE'}[tech.type]||'TECHNIQUE';

  const stepsHtml = tech.steps.map((s,i)=>`
    <li><div class="sn">${i+1}</div><span>${s}</span></li>
  `).join('');

  const nextHtml = tech.next && tech.next.length ? `
    <div class="next-r">
      <div class="next-l">VERS</div>
      <div class="next-chips">
        ${tech.next.map(nid=>{
          const np = POS.find(p=>p.id===nid);
          return np ? `<div class="nchip" onclick="event.stopPropagation();goTo('${np.id}')">${np.icon} ${np.name}</div>` : '';
        }).join('')}
      </div>
    </div>
  ` : '';

  return `
    <div class="tc" id="tc-${tid}" onclick="toggleTech('${tid}')">
      <div class="tc-hd">
        <div style="flex:1;min-width:0">
          <div class="tc-name">${tech.name}</div>
          <div class="tc-key">${tech.key}</div>
        </div>
        <div class="tc-tag ${cls}">${lbl}</div>
      </div>
      <div class="tc-body" id="tb-${tid}">
        <ul class="steps">${stepsHtml}</ul>
        <div class="drill-b">
          <span class="drill-l">DRILL</span>
          <span class="drill-t">${tech.drill}</span>
        </div>
        ${nextHtml}
      </div>
    </div>
  `;
}

function toggleSec(sid) {
  openSecs[sid] = !openSecs[sid];
  document.getElementById('sec-'+sid)?.classList.toggle('o', openSecs[sid]);
  document.getElementById('chev-'+sid)?.classList.toggle('o', openSecs[sid]);
}
function toggleTech(tid) {
  openTechs[tid] = !openTechs[tid];
  document.getElementById('tb-'+tid)?.classList.toggle('o', openTechs[tid]);
  document.getElementById('tc-'+tid)?.classList.toggle('exp', openTechs[tid]);
}

// ── LEGEND ──
function buildLegend() {
  const cats = [...new Set(POS.map(p=>p.cat))];
  const colors = Object.fromEntries(POS.map(p=>[p.cat, p.color]));
  const lg = document.getElementById('legend');
  cats.forEach(c => {
    const d = document.createElement('div');
    d.className = 'leg-item';
    d.innerHTML = `<div class="leg-dot" style="background:${colors[c]}"></div><div class="leg-lbl">${c}</div>`;
    lg.appendChild(d);
  });
}

// ── INIT ──
initStars();
resize();
buildLegend();
draw();
window.addEventListener('resize', resize);
</script>
</body>
</html>
